<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R-Cafe Booking Assistant</title>
  <style>
    :root {
      --navy: #232f3e;
      --orange: #ff9900;
      --orange-dark: #e68a00;
      --bg: #f0f2f5;
      --panel: #ffffff;
      --line: #dde3ea;
      --text: #111827;
      --muted: #6b7280;
      --danger: #b91c1c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      min-height: 68px;
      padding: 14px 22px;
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--orange);
      color: #111;
      display: grid;
      place-items: center;
      font-weight: 800;
      flex: 0 0 auto;
    }

    h1 {
      font-size: 19px;
      line-height: 1.2;
      font-weight: 750;
    }

    .subtitle {
      margin-top: 3px;
      font-size: 12px;
      color: #c6d2df;
    }

    .header-action {
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: transparent;
      color: #fff;
      border-radius: 6px;
      min-height: 36px;
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .header-action:hover { background: rgba(255, 255, 255, 0.1); }

    main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: min(100%, 980px);
      margin: 0 auto;
      background: var(--panel);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .messages {
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #f8fafc;
    }

    .welcome {
      max-width: 680px;
      margin: 42px auto 0;
      text-align: center;
      color: var(--muted);
    }

    .welcome-badge {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      background: var(--navy);
      color: #fff;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      font-size: 25px;
      font-weight: 800;
      border-bottom: 4px solid var(--orange);
    }

    .welcome h2 {
      font-size: 24px;
      color: #27384b;
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.55;
      margin: 0 auto;
    }

    .prompt-grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .prompt-chip {
      border: 1px solid #dde3ea;
      background: #fff;
      color: #374151;
      border-radius: 8px;
      padding: 12px;
      text-align: left;
      font: inherit;
      font-size: 13px;
      line-height: 1.35;
      cursor: pointer;
    }

    .prompt-chip:hover {
      border-color: var(--orange);
      background: #fffaf2;
    }

    .message {
      max-width: min(760px, 76%);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.agent, .message.error { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 11px;
      color: #8b95a1;
      font-weight: 750;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.05);
    }

    .message.user .bubble {
      background: var(--navy);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.agent .bubble {
      background: #fff;
      color: var(--text);
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    .message.error .bubble {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fca5a5;
      border-bottom-left-radius: 4px;
    }

    .message.user.has-error .bubble {
      border: 1px solid #fca5a5;
      box-shadow: 0 0 0 3px rgba(185, 28, 28, 0.08);
    }

    .message-status {
      max-width: min(420px, 100%);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.45;
      text-align: left;
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.05);
    }

    .message-status.error {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fca5a5;
    }

    .status-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .retry-btn {
      border: 1px solid #fca5a5;
      background: #fff;
      color: var(--danger);
      border-radius: 7px;
      min-height: 30px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .retry-btn:hover:not(:disabled) {
      background: #fee2e2;
    }

    .retry-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .typing-bubble {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .input-bar {
      padding: 16px 18px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #query-input {
      flex: 1;
      min-height: 46px;
      max-height: 132px;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      background: #fff;
    }

    #query-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.14);
    }

    .send-btn {
      min-width: 96px;
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--orange);
      color: #111;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .send-btn:hover:not(:disabled) { background: var(--orange-dark); }
    .send-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        padding: 13px 16px;
      }

      .header-action {
        min-height: 34px;
        padding: 7px 10px;
      }

      main {
        border: 0;
      }

      .messages {
        padding: 22px 14px;
      }

      .message {
        max-width: 90%;
      }

      .prompt-grid {
        grid-template-columns: 1fr;
      }

      .input-bar {
        padding: 12px;
      }

      .send-btn {
        min-width: 78px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">RC</div>
      <div>
        <h1>R-Cafe Booking Assistant</h1>
        <div class="subtitle">Table reservations and guest support</div>
      </div>
    </div>
    <button class="header-action" onclick="startNewConversation()">New Chat</button>
  </header>

  <main>
    <div class="messages" id="messages">
      <div class="welcome" id="welcome-msg">
        <div class="welcome-badge">RC</div>
        <h2>Welcome to R-Cafe</h2>
        <p>I can help book, find, update, or cancel your table reservation.</p>
        <div class="prompt-grid">
          <button class="prompt-chip" onclick="usePrompt('Book a table for 4 people tomorrow at 7 PM.')">Book a table</button>
          <button class="prompt-chip" onclick="usePrompt('Find my booking under the name Anna.')">Find my booking</button>
          <button class="prompt-chip" onclick="usePrompt('I need to update my reservation.')">Update a reservation</button>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="query-input" rows="1" placeholder="Type your message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </main>

  <script>
    let currentSessionId = null;
    const dummyLocation = {
      mode: "dummy",
      label: "R-Cafe primary branch",
      city: "Not collected",
      permissionRequired: "false",
      gpsUsed: "false"
    };

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 132) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function detectDeviceType() {
      const width = window.innerWidth;
      if (width < 768) return "mobile-web";
      if (width < 1100) return "tablet-web";
      return "desktop-web";
    }

    function localDateParts(now) {
      return {
        date: [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, "0"),
          String(now.getDate()).padStart(2, "0")
        ].join("-"),
        time: [
          String(now.getHours()).padStart(2, "0"),
          String(now.getMinutes()).padStart(2, "0")
        ].join(":")
      };
    }

    function buildSessionState() {
      const now = new Date();
      const local = localDateParts(now);
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
      const locale = navigator.language || "unknown";
      const timestamp = now.toISOString();

      return {
        sessionAttributes: {
          application: "r-cafe-render-ui",
          channel: "web",
          timezone,
          locale,
          deviceType: detectDeviceType(),
          screenSize: `${window.screen.width}x${window.screen.height}`,
          currentDate: local.date,
          currentTime: local.time,
          currentWeekday: now.toLocaleDateString(locale, { weekday: "long" }),
          currentTimestamp: timestamp,
          currentTimestampUtc: timestamp,
          timezoneOffsetMinutes: String(-now.getTimezoneOffset()),
          locationMode: dummyLocation.mode,
          locationLabel: dummyLocation.label,
          locationCity: dummyLocation.city,
          locationPermissionRequired: dummyLocation.permissionRequired,
          gpsUsed: dummyLocation.gpsUsed
        }
      };
    }

    async function createNewSession() {
      const res = await fetch("/new_session", { method: "POST" });
      const data = await res.json();
      currentSessionId = data.session_id;
    }

    async function ensureSession() {
      if (!currentSessionId) {
        await createNewSession();
      }
    }

    async function startNewConversation() {
      await createNewSession();
      renderWelcome();
      document.getElementById("query-input").focus();
    }

    function renderWelcome() {
      const container = document.getElementById("messages");
      container.innerHTML = `
        <div class="welcome" id="welcome-msg">
          <div class="welcome-badge">RC</div>
          <h2>Welcome to R-Cafe</h2>
          <p>I can help book, find, update, or cancel your table reservation.</p>
          <div class="prompt-grid">
            <button class="prompt-chip" onclick="usePrompt('Book a table for 4 people tomorrow at 7 PM.')">Book a table</button>
            <button class="prompt-chip" onclick="usePrompt('Find my booking under the name Anna.')">Find my booking</button>
            <button class="prompt-chip" onclick="usePrompt('I need to update my reservation.')">Update a reservation</button>
          </div>
        </div>`;
    }

    function usePrompt(text) {
      const input = document.getElementById("query-input");
      input.value = text;
      autoResize(input);
      input.focus();
    }

    function appendMessage(role, text) {
      const welcome = document.getElementById("welcome-msg");
      if (welcome) welcome.remove();

      const container = document.getElementById("messages");
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = role === "user" ? "You" : "R-Cafe";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = cleanResponseText(text);

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      scrollMessages();
      return wrapper;
    }

    function cleanResponseText(text) {
      return String(text || "").replace(/^\s*Response:\s*/i, "").trim();
    }

    function scrollMessages() {
      const container = document.getElementById("messages");
      container.scrollTop = container.scrollHeight;
    }

    function setMessageError(messageEl, text, query) {
      clearMessageStatus(messageEl);
      messageEl.classList.add("has-error");

      const status = document.createElement("div");
      status.className = "message-status error";

      const copy = document.createElement("div");
      copy.textContent = cleanResponseText(text) || "Sorry, R-Cafe could not process that. Please try again.";

      const actions = document.createElement("div");
      actions.className = "status-actions";

      const retry = document.createElement("button");
      retry.type = "button";
      retry.className = "retry-btn";
      retry.textContent = "Retry";
      retry.addEventListener("click", () => retryMessage(query, messageEl, retry));

      actions.appendChild(retry);
      status.appendChild(copy);
      status.appendChild(actions);
      messageEl.appendChild(status);
      scrollMessages();
    }

    function clearMessageStatus(messageEl) {
      if (!messageEl) return;
      messageEl.classList.remove("has-error");
      const existing = messageEl.querySelector(".message-status");
      if (existing) existing.remove();
    }

    function showTyping() {
      const container = document.getElementById("messages");
      const wrapper = document.createElement("div");
      wrapper.className = "message agent";
      wrapper.id = "typing-indicator";
      wrapper.innerHTML = `
        <div class="msg-label">R-Cafe</div>
        <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      container.appendChild(wrapper);
      scrollMessages();
    }

    function removeTyping() {
      const el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    async function retryMessage(query, userMessageEl, retryButton) {
      if (retryButton) retryButton.disabled = true;
      clearMessageStatus(userMessageEl);
      await submitQuery(query, userMessageEl);
    }

    async function sendMessage() {
      const queryInput = document.getElementById("query-input");
      const query = queryInput.value.trim();
      const sendBtn = document.getElementById("send-btn");

      if (!query) return;

      queryInput.value = "";
      queryInput.style.height = "auto";
      sendBtn.disabled = true;

      const userMessageEl = appendMessage("user", query);
      await submitQuery(query, userMessageEl);
      sendBtn.disabled = false;
      queryInput.focus();
    }

    async function submitQuery(query, userMessageEl) {
      const sendBtn = document.getElementById("send-btn");
      sendBtn.disabled = true;
      showTyping();

      try {
        await ensureSession();

        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            session_id: currentSessionId,
            enable_trace: false,
            session_state: buildSessionState()
          })
        });

        let data = {};
        try {
          data = await res.json();
        } catch (e) {
          data = {};
        }

        removeTyping();

        if (!res.ok || data.error) {
          const errorText = data.error || "R-Cafe could not process this request. Please try again.";
          setMessageError(userMessageEl, errorText, query);
          return;
        }

        appendMessage("agent", data.response || "No response received.");
      } catch (e) {
        removeTyping();
        setMessageError(userMessageEl, "Sorry, I could not reach R-Cafe right now. Please try again.", query);
      } finally {
        sendBtn.disabled = false;
      }
    }

    createNewSession().catch(() => {});
  </script>
</body>
</html>
